<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wemert Group Realty</title>
<style>
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f6f9}
header{background:#0a2a66;color:#fff;padding:20px;text-align:center}
.filters{background:#fff;padding:15px}
.filters select,.filters button{width:100%;padding:12px;margin-top:10px;font-size:16px}
.listings{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:15px;padding:15px}
.card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,.1)}
.card img{width:100%;height:200px;object-fit:cover;display:block}
.card-content{padding:12px}
.card-content h3{margin:6px 0}
.icons{color:#555;font-size:14px;margin-bottom:8px}
.card button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:6px;background:#0a2a66;color:#fff;font-size:16px;cursor:pointer}
footer{background:#0a2a66;color:#fff;text-align:center;padding:15px}
</style>
</head>
<body>
<header>
<h1>Wemert Group Realty</h1>
<p>Affordable Homes Across Orlando, Florida</p>
</header>
<div class="filters">
<select id="priceFilter">
<option value="">Max Price</option>
<option value="200000">$200,000</option>
<option value="250000">$250,000</option>
<option value="300000">$300,000</option>
<option value="350000">$350,000</option>
<option value="400000">$400,000</option>
</select>
<select id="bedFilter">
<option value="">Min Bedrooms</option>
<option value="2">2+</option>
<option value="3">3+</option>
<option value="4">4+</option>
<option value="5">5+</option>
</select>
<button onclick="filterHomes()">Search Homes</button>
</div>
<div class="listings" id="listings"></div>
<footer>
<p><strong>Wemert Group Realty</strong></p>
<p>📧 jwemertgrouprealty1@gmail.com</p>
<p>📞 407-435-5072</p>
</footer>

function render(list){const box=document.getElementById('listings');box.innerHTML='';list.forEach(h=>{box.innerHTML+=`<div class="card"><img src="${h.img}" alt="House in ${h.loc}"><div class="card-content"><h3>$${h.price.toLocaleString()}</h3><p>${h.loc}, Orlando FL</p><p class="icons">🛏 ${h.bed} Bedrooms</p><button onclick="email('${h.loc}')">View Details / Schedule Visit</button></div></div>`})}
function filterHomes(){const p=document.getElementById('priceFilter').value;const b=document.getElementById('bedFilter').value;render(homes.filter(h=>(!p||h.price<=p)&&(!b||h.bed>=b)))}
function email(loc){window.location.href=`mailto:jwemertgrouprealty1@gmail.com?subject=House Inquiry - ${loc}`}
